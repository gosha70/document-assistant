app:
  name: "Document Assistant (D.O.T.)"
  host: "127.0.0.1"
  port: 8000
  debug: false

embedding:
  model_name: "hkunlp/instructor-large"
  type: "instructor"
  device: "cpu"
  normalize_embeddings: true

reranker:
  enabled: true
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5

chunking:
  chunk_size: 512
  chunk_overlap: 50
  tokenizer: "tiktoken:cl100k_base"
  batch_size: 300

model:
  default_model_name: "hkunlp/instructor-large"
  default_model_id: "TheBloke/Llama-2-7b-Chat-GGUF"
  default_model_basename: "llama-2-7b-chat.Q4_K_M.gguf"
  n_ctx: 6144
  max_tokens: 512
  n_batch: 512
  n_gpu_layers: 40
  cache_dir: "./model_cache/"

llm:
  backend: "legacy"
  model: null
  base_url: null
  api_key: null
  temperature: 0.2
  max_tokens: 512

vectorstore:
  backend: "chroma"
  collection_name: "EGOGE_DOCUMENTS_DB"
  persist_directory: null
  chroma_anonymized_telemetry: false
  qdrant_url: "http://localhost:6333"
  qdrant_api_key: null
  qdrant_prefer_grpc: false
  allow_legacy_collections: false

upload:
  max_file_size_mb: 50
  allowed_extensions:
    - csv
    - ddl
    - xlsx
    - java
    - js
    - json
    - html
    - md
    - pdf
    - py
    - rtf
    - sql
    - txt
    - xml
    - xsl
    - yaml

auth:
  enabled: false
  admin_token: null
  user_token: null

rate_limit:
  enabled: false
  max_requests: 60
  window_seconds: 60

telemetry:
  enabled: true
  log_llm_calls: true

alerting:
  enabled: true
  error_rate_threshold: 0.10
  memory_rss_mb_threshold: 1024
  ingest_error_threshold: 5
  retrieval_no_source_threshold: 10
  window_seconds: 3600

reporting:
  enabled: true
  interval_seconds: 3600
  max_snapshots: 24

system_prompt: >
  You are a document assistant. Answer questions using ONLY the provided context.
  Rules:
  1. Read the context carefully before answering.
  2. NEVER use information outside the provided context. Do not provide "general knowledge" or speculation.
  3. If the answer is not in the context, say exactly: "I could not find information about this in the provided documents."
  4. Explain concepts in clear, plain language. Summarize and synthesize information from the context rather than just quoting raw text or formulas.
  5. When relevant, mention where in the context the information comes from.
  6. Be concise and direct.
