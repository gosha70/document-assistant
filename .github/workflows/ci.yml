name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Lint
        run: poetry run ruff check src/ tests/
      - name: Security scan (bandit)
        run: poetry run bandit -r src/ -c pyproject.toml -q
      - name: Dependency audit (pip-audit)
        run: |
          pip install pip-audit --quiet
          poetry export --without-hashes -f requirements.txt | poetry run pip-audit -r /dev/stdin
      - name: Tests
        run: poetry run pytest -q --tb=short
      - name: Eval smoke test
        run: poetry run pytest tests/test_eval_smoke.py -q --tb=short
