name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `poetry run ...`
        2. Upload document ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include full error messages and stack traces.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `poetry version` or git commit SHA
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, vector store backend, LLM provider
      placeholder: |
        Python: 3.11.x
        OS: macOS 14 / Ubuntu 22.04
        Vector store: Chroma / Pinecone
        LLM: OpenAI GPT-4o / Claude
    validations:
      required: false
